---

name: CI
on:
  push:
    branches: [staging, trying]

permissions:
  # Allow write access to the source code to enable GitHub Pages publishing.
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            glibc: "2.32"
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            glibc: "2.32"
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      runner: ${{ matrix.runner }}
      target: ${{ matrix.target }}
      glibc: ${{ matrix.glibc }}
      release: false

  integration-test:
    name: Test CriticalUp on GHA Runners
    needs: [build]
    environment: testing
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    env:
      CRITICALUP_TOKEN: ${{ secrets.CRITICALUP_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: "Define toolchain"
        shell: bash # Powershell does not do heredocs
        run: |
          mkdir -p crab-boil
          cd crab-boil
          cat <<- EOF > criticalup.toml
            manifest-version = 1

            [products.ferrocene]
            release = "stable-24.11.0"
            packages = [
                "cargo-\${rustc-host}",
                "rustc-\${rustc-host}",
                "rust-std-\${rustc-host}",
            ]
          EOF

      - name: Configure directory
        uses: ./.github/actions/criticalup-config
        with:
          token: ${{ secrets.CRITICALUP_TOKEN }}
          path: crab-boil
          matrix: ${{ toJSON(matrix) }}
          runner: ${{ toJSON(runner) }}
          
      - name: Change toolchain and dir to test RA installation
        shell: bash # bash necessary for heredocs
        run: |
          mkdir poor-ferris 
          cd poor-ferris
          cat <<- EOF > criticalup.toml
            manifest-version = 1

            [products.ferrocene]
            release = "nightly-2026-01-29"
            packages = [
                "cargo-\${rustc-host}",
                "rustc-\${rustc-host}",
                "rust-std-\${rustc-host}",
                "rust-analyzer-\${rustc-host}"
            ]
          EOF
      - name: Rust-toolchain file
        shell: bash
        run: |
          cat <<- EOF > rust-toolchain.toml
            [toolchain]
            channel = "ferrocene"
            components = ["cargo", "rustfmt", "clippy", "rust-analyzer"]
            profile = "default"
          EOF

      - name: Configure directory
        uses: ./.github/actions/criticalup-config
        with:
          token: ${{ secrets.CRITICALUP_TOKEN }}
          path: poor-ferris
          matrix: ${{ toJSON(matrix) }}
          runner: ${{ toJSON(runner) }}

      - name: Test RA installation
        shell: bash # bash necessary for heredocs
        working-directory: poor-ferris
        run: |
          ./criticalup which rust-analyzer
          ./criticalup link create # linking rust-analyzer
          which rust-analyzer
          rust-analyzer --version

  package:
    secrets: inherit
    uses: ./.github/workflows/package.yml
    with:
      sign: false

  license:
    name: Check licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ferrous-systems/shared-github-actions/reuse@main


  docs:
    uses: ./.github/workflows/docs.yml
    secrets: inherit

  build-finished:
    name: CI build successful
    runs-on: ubuntu-latest
    if: success()
    needs:
      - build
      - integration-test
      - package
      - docs
      - license
    steps:
      - name: Mark the build as successful
        run: exit 0
